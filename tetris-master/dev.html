    body {
      margin: 0;
      background-color:#000000;
      color:#C2FFAE;
      font-family: 'DejaVuSansMono', monospace;
      font-size:12px;
      line-height: 1.2;

    #loading {
      margin:20px;
    }
    #container {
      display:none;
    }
  </style>

</head><body>

  <div id="loading">LOADING..._</div>

  <div id="container">
    <div id="game"></div>

    <div class="controls left">
      <button id="control-drop" data-key="32">DROP</button>
      <button id="control-left" data-key="37">LEFT</button>
    </div>

    <div class="controls right">
      <button id="control-pause" data-key="80">PAUSE</button>
      <button id="control-rotate" data-key="38">ROTATE</button>
      <button id="control-right" data-key="39">RIGHT</button>
    </div>

    <div class="controls top">
      <button id="mute-sound">MUTE SOUND</button>
    </div>

    <div id="userboard">
      <div id="your-score"></div>
      <div id="your-best-score"></div><br/><br/>
      YOUR NAME:&nbsp;<input type="text" id="name-input" /><br/><br/><br/>
      <div style="text-align:right;">
        <button id="userboard-close">CANCEL</button>
        <button id="userboard-send">SEND</button>
      </div>
    </div>

    <div id="leaderboard">
      MONTH LEADERS:<br/><br/>
      <div id="score-leaders"></div>
      <div style="text-align:center;">
        <button id="leaderboard-close">CLOSE</button></div>
    </div>

    <div id="share">
      <a target="_blank"
        rel="noopener"
        href="https://www.linkedin.com/in/shubhrajit1pallob/"
        aria-label="LinkedIn profile"
        title="LinkedIn profile"
        style="display:inline-flex;align-items:center;vertical-align:middle;"><svg width="14" height="14" viewBox="0 0 24 24" aria-hidden="true" style="fill:#C2FFAE"><path d="M4.98 3.5C4.98 4.88 3.86 6 2.48 6S0 4.88 0 3.5 1.12 1 2.5 1s2.48 1.12 2.48 2.5zM.5 8h4V23h-4V8zm7.5 0h3.8v2.05h.05C12.36 8.9 13.98 8 16.1 8c4.42 0 5.24 2.9 5.24 6.68V23h-4v-7.38c0-1.76-.03-4.03-2.46-4.03-2.46 0-2.84 1.92-2.84 3.9V23H8V8z"/></svg></a>

      <a class="github-button" href="https://github.com/Shubhrajit1pallob/tetris" data-icon="octicon-star" data-count-href="/Shubhrajit1pallob/tetris/stargazers" data-count-api="/repos/Shubhrajit1pallob/tetris#stargazers_count" data-count-aria-label="# stargazers on GitHub" aria-label="Star Shubhrajit1pallob/tetris on GitHub">Star</a>

      <br/><br/><br/>

      <span id="leaderboard-link" class="link">Leaderboard</span>&nbsp;&nbsp;&nbsp;
      <a target="_blank" href="https://github.com/Shubhrajit1pallob/tetris" rel="noopener">Fork on Github</a>
    </div>
  </div>
