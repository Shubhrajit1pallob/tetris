apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: score-api
  namespace: tetris
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: api.<your-domain>
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: score-api
                port:
                  number: 80
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: score-api
                port:
                  number: 80
