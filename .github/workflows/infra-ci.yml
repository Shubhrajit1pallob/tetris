name: Infrastructure CI & Security Scan

on:
    push:
        branches:
            - infra
        paths:
            - 'Terraform/**'
            - '.github/**'

permissions:
    id-token: write
    contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    code-security-scan:
        if: false
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
            
            - name: Set Up SAST for code scanning
              uses: aquasecurity/trivy-action@master
              with:
                scan-type: 'fs'
                scan-ref: './Terraform'
                format: 'sarif'
                output: 'terraform-trivy-results.sarif'
            
            - name: Upload Trivy SARIF Results
              uses: actions/upload-artifact@v4
              with:
                name: terraform-trivy-results
                path: terraform-trivy-results.sarif

            - name: Set Up Python for Checkov scan
              uses: actions/setup-python@v5
              with:
                python-version: '3.9'


            - name: Run Checkov scan
              id: checkov-scan
              uses: bridgecrewio/checkov-action@v12
              with:
                skip_check: CKV_AZURE_117,CKV_AZURE_227,CKV_AZURE_115,CKV_AZURE_168,CKV_AZURE_232,CKV_AZURE_226,CKV_AZURE_6,CKV_AZURE_172,CKV_AZURE_171,CKV_AZURE_233,CKV_AZURE_167,CKV_AZURE_164,CKV_AZURE_166,CKV_AZURE_139,CKV_AZURE_165,CKV_AZURE_237,CKV_AZURE_163,CKV_AZURE_141,CKV_AZURE_170,CKV_AZURE_101,CKV_AZURE_132,CKV_AZURE_99,CKV_AZURE_100,CKV_AZURE_140
                directory: './Terraform'
                framework: 'terraform'
                output_format: 'sarif'
                output_file_path: 'checkov-results.sarif'

            - name: Upload Checkov SARIF Results
              uses: actions/upload-artifact@v4
              with:
                name: checkov-results
                path: checkov-results.sarif
        
    validate-terraform-code:
        if: false
        needs: code-security-scan
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Terraform
              uses: hashicorp/setup-terraform@v2
              with:
                terraform_version: 1.5.0

            - name: Initialize Terraform
              run: terraform init -backend=false
              working-directory: ./Terraform

            - name: Validate Terraform
              run: terraform -chdir=Terraform validate

            - name: Terraform Format Check
              run: terraform fmt -check -diff
              working-directory: ./Terraform

            - name: Setup TFLint
              uses: terraform-linters/setup-tflint@v2
              with:
                tflint_version: latest

            - name: Initialize TFLint plugins
              run: tflint --init
              working-directory: ./Terraform

            - name: Run TFLint
              run: tflint -f compact
              working-directory: ./Terraform

    infra-deploy:
        # needs: validate-terraform-code
        runs-on: ubuntu-latest
        env:
          ARM_USE_OIDC: true
          ARM_USE_AZUREAD: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Azure login
              uses: azure/login@v2
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

            - name: Set up Terraform
              uses: hashicorp/setup-terraform@v2
              with:
                terraform_version: 1.5.0

            - name: Initialize Terraform
              run: |-
                terraform init \
                  -backend-config="resource_group_name=${{ secrets.TFSTATE_RESOURCE_GROUP }}" \
                  -backend-config="storage_account_name=${{ secrets.TFSTATE_STORAGE_ACCOUNT }}" \
                  -backend-config="container_name=${{ secrets.TFSTATE_CONTAINER }}" \
                  -backend-config="key=terraform.tfstate"
              working-directory: ./Terraform

            - name: Terraform state list
              run: terraform state list
              working-directory: ./Terraform

            - name: Terraform Plan
              run: |-
                set +e
                terraform plan -detailed-exitcode \
                  -var="ssh_public_key=${{ secrets.AZURE_VM_KEY_PUB }}" \
                  -var="project_name=tetris" \
                  -var='aks_cluster_name=tetris-aks' \
                  -var='aks_dns_prefix=tetrisaks' \
                  -var='aks_node_count=3' \
                  -var='aks_node_vm_size=Standard_D4s_v5' \
                  -var='cosmos_account_name=tetriscosmosdbacct01' \
                  -var='cosmos_database_name=tetrisdb' \
                  -var='cosmos_container_name=scores' \
                  -out=tfplan
                code=$?
                set -e
                if [ "$code" -eq 1 ]; then
                  echo "Terraform plan failed"
                  exit 1
                fi
                echo "plan_exit_code=$code" >> "$GITHUB_OUTPUT"
                if [ "$code" -eq 2 ]; then
                  echo "has_changes=true" >> "$GITHUB_OUTPUT"
                else
                  echo "has_changes=false" >> "$GITHUB_OUTPUT"
                fi
              id: terraform-plan
              working-directory: ./Terraform

            - name: Show Plan Decision
              run: |
                echo "plan_exit_code=${{ steps.terraform-plan.outputs.plan_exit_code }}"
                echo "has_changes=${{ steps.terraform-plan.outputs.has_changes }}"

            - name: Apply Terraform
              if: steps.terraform-plan.outputs.has_changes == 'true'
              run: |
                terraform apply -auto-approve tfplan
              working-directory: ./Terraform

            - name: Terraform Output
              run: terraform output
              working-directory: ./Terraform
