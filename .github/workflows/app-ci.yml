name: App CI & Security Scan

on:
  push:
    branches:
        - app
    paths:
      - 'tetris-master/**' # Only run if the app code changes

permissions:
  id-token: write
  contents: read

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: SCA Scan (npm audit)
        run: |
          cd tetris-master
          npm audit --audit-level=high

  build-and-container-scan:
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Image
        run: docker build -t my-aks-app:${{ github.sha }} ./tetris-master
      
      - name: Scan Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'my-aks-app:${{ github.sha }}'
          format: 'table'
          exit-code: '1' # Fail the build if vulnerabilities found
          severity: 'CRITICAL,HIGH'

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      
      - name: ACR login
        run: az acr login --name ${{ vars.ACR_NAME }}

      - run: docker tag my-aks-app:${{ github.sha }} ${{ vars.ACR_NAME }}.azurecr.io/my-aks-app:${{ github.sha }}
      - run: docker push ${{ vars.ACR_NAME }}.azurecr.io/my-aks-app:${{ github.sha }}